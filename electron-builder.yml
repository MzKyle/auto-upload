appId: com.uploader.app
productName: 数据采集上传工具
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources:
  - from: resources/
    to: resources/
asar: true
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
